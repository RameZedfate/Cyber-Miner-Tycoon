<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>即時比價通 FlightDeal - 機票比價 ‧ 即期機票</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>✈️ 即時比價通 FlightDeal</h1>
    <p>一次比較多家訂票平台，找到最便宜的機票與即期特價</p>
  </header>

  <main class="container">
    <!-- 搜尋表單 -->
    <section class="search-card">
      <div class="trip-type">
        <label><input type="radio" name="tripType" value="oneway" checked /> 單程</label>
        <label><input type="radio" name="tripType" value="roundtrip" /> 來回</label>
      </div>

      <form id="search-form" class="search-grid">
        <div class="field">
          <label for="origin">出發地</label>
          <select id="origin" required></select>
        </div>

        <button type="button" id="swap-btn" class="swap-btn" title="交換出發地與目的地">⇄</button>

        <div class="field">
          <label for="destination">目的地</label>
          <select id="destination" required></select>
        </div>

        <div class="field">
          <label for="depart-date">出發日期</label>
          <input type="date" id="depart-date" required />
        </div>

        <div class="field" id="return-date-field" style="display:none;">
          <label for="return-date">回程日期</label>
          <input type="date" id="return-date" />
        </div>

        <div class="field">
          <label for="passengers">乘客人數</label>
          <input type="number" id="passengers" min="1" max="9" value="1" />
        </div>

        <div class="field">
          <label for="cabin">艙等</label>
          <select id="cabin">
            <option value="economy">經濟艙</option>
            <option value="premium">豪華經濟艙</option>
            <option value="business">商務艙</option>
            <option value="first">頭等艙</option>
          </select>
        </div>

        <button type="submit" class="search-btn">搜尋機票</button>
      </form>
    </section>

    <!-- 即期特價 -->
    <section>
      <div class="section-title">
        <h2>🔥 即期特價機票</h2>
        <span class="updated-at" id="deals-updated"><span class="live-dot"></span>即時更新中</span>
      </div>
      <div class="deals-scroll" id="deals-scroll"></div>
    </section>

    <!-- 搜尋結果 -->
    <section>
      <div class="section-title">
        <h2>搜尋結果</h2>
      </div>

      <div class="toolbar" id="toolbar" style="display:none;">
        <div class="group">
          <label for="sort-select">排序：</label>
          <select id="sort-select">
            <option value="price">最低價優先</option>
            <option value="duration">飛行時間最短</option>
            <option value="depart">最早出發</option>
          </select>
        </div>
        <label class="checkbox"><input type="checkbox" id="filter-direct" /> 只看直飛</label>
        <label class="checkbox"><input type="checkbox" id="filter-baggage" /> 含托運行李</label>
        <span class="result-count" id="result-count"></span>
      </div>

      <div class="flight-list" id="flight-list">
        <p class="empty-state">請選擇出發地、目的地與日期，開始搜尋機票 ✈️</p>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>本頁面所有航班與價格資訊為示範用模擬資料，僅供介面展示，實際票價請以各訂票平台公告為準。</p>
  </footer>

  <script src="./js/data.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
